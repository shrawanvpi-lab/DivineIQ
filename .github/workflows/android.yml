name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

# Cancel superseded runs on the same branch/PR to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle (with dependency caching)
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Lint
        run: ./gradlew lintDebug --stacktrace

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Release APK
        # No signing secrets are required: without a configured keystore the
        # release build type falls back to debug signing (see
        # app/build.gradle.kts), so this always produces an installable,
        # if unsigned-for-production, artifact.
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DivineIQ-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DivineIQ-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DivineIQ-lint-report
          path: app/build/reports/lint-results-*.html
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DivineIQ-unit-test-report
          path: app/build/reports/tests/testDebugUnitTest
          if-no-files-found: ignore
          retention-days: 14
